name: Deploy to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: azure-webapp-${{ github.ref }}
  cancel-in-progress: true

env:
  AZURE_WEBAPP_NAME: Selenium
  AZURE_RESOURCE_GROUP: MCP
  CONTAINER_PORT: "8000"
  REGISTRY: ghcr.io

jobs:
  build-and-deploy:
    name: Build and deploy container
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required GitHub secrets
        shell: bash
        env:
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        run: |
          missing=0

          for secret_name in \
            AZURE_CREDENTIALS \
            GHCR_USERNAME \
            GHCR_PAT
          do
            if [ -z "${!secret_name}" ]; then
              echo "::error::Missing GitHub secret: ${secret_name}"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          if ! echo "$AZURE_CREDENTIALS" | jq -e \
            '.clientId and .clientSecret and .subscriptionId and .tenantId' > /dev/null
          then
            echo "::error::AZURE_CREDENTIALS must be JSON with clientId, clientSecret, subscriptionId, and tenantId."
            exit 1
          fi

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tags
        id: image
        shell: bash
        run: |
          IMAGE_REPOSITORY="$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')"
          IMAGE_SHA="${REGISTRY}/${IMAGE_REPOSITORY}:${{ github.sha }}"
          IMAGE_LATEST="${REGISTRY}/${IMAGE_REPOSITORY}:latest"
          echo "repository=${IMAGE_REPOSITORY}" >> "$GITHUB_OUTPUT"
          echo "sha=${IMAGE_SHA}" >> "$GITHUB_OUTPUT"
          echo "latest=${IMAGE_LATEST}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.sha }}
            ${{ steps.image.outputs.latest }}

      - name: Configure Azure Web App settings
        uses: azure/cli@v2
        with:
          inlineScript: |
            az webapp config appsettings set \
              --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
              --name "${{ env.AZURE_WEBAPP_NAME }}" \
              --settings \
                WEBSITES_PORT="${{ env.CONTAINER_PORT }}" \
                SELENIUM_BROWSER="chrome" \
                SELENIUM_HEADLESS="true" \
                SELENIUM_HTTP_HOST="0.0.0.0" \
                SELENIUM_HTTP_PORT="${{ env.CONTAINER_PORT }}" \
                SELENIUM_ALLOW_FILE_URLS="false"

            az webapp config container set \
              --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
              --name "${{ env.AZURE_WEBAPP_NAME }}" \
              --docker-custom-image-name "${{ steps.image.outputs.sha }}" \
              --docker-registry-server-url "https://${{ env.REGISTRY }}" \
              --docker-registry-server-user "${{ secrets.GHCR_USERNAME }}" \
              --docker-registry-server-password "${{ secrets.GHCR_PAT }}"

            az webapp config set \
              --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
              --name "${{ env.AZURE_WEBAPP_NAME }}" \
              --generic-configurations '{"healthCheckPath":"/healthz"}'

      - name: Deploy image to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          images: ${{ steps.image.outputs.sha }}
